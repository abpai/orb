  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="18">
    <text x="94" y="156" fill="#60A5FA">you:</text>
    <text x="150" y="156" fill="#E5E7EB">what project are we working on?</text>

    <text x="94" y="192" fill="#A3E635">claude:</text>
    <text x="184" y="192" fill="#9CA3AF">We're working on the "orb" project, located at /Users/andypai/Projects/orb.</text>
    <text x="184" y="220" fill="#9CA3AF">Would you like me to explore the codebase and give you a better overview?</text>

    <text x="94" y="286" fill="#60A5FA">you:</text>
    <text x="150" y="286" fill="#E5E7EB">yes, explore and give a summary of the architecture</text>

    <text x="140" y="332" fill="#22D3EE">✓ Agent</text>
    <text x="224" y="332" fill="#9CA3AF">Explore orb project architecture</text>

    <text x="140" y="360" fill="#34D399">✓ Read</text>
    <text x="214" y="360" fill="#9CA3AF">/Users/andypai/Projects/orb/package.json</text>

    <text x="140" y="388" fill="#34D399">✓ Read</text>
    <text x="214" y="388" fill="#9CA3AF">/Users/andypai/Projects/orb/README.md</text>

    <text x="140" y="416" fill="#34D399">✓ Bash</text>
    <text x="214" y="416" fill="#9CA3AF">find /Users/andypai/Projects/orb/src ...</text>

    <text x="140" y="444" fill="#34D399">✓ Bash</text>
    <text x="214" y="444" fill="#9CA3AF">ls -la /Users/andypai/Projects/orb/src</text>

    <text x="140" y="472" fill="#34D399">✓ Read</text>
    <text x="214" y="472" fill="#9CA3AF">/Users/andypai/Projects/orb/src/index.ts</text>

    <text x="94" y="538" fill="#A3E635">claude:</text>
    <text x="184" y="538" fill="#D1D5DB">Orb is a voice-driven AI terminal assistant for your codebase. It uses Bun,</text>
    <text x="184" y="566" fill="#D1D5DB">Ink, and a frame-based pipeline that routes prompts through Anthropic or</text>
    <text x="184" y="594" fill="#D1D5DB">OpenAI, then optionally through streaming text-to-speech.</text>

    <text x="184" y="638" fill="#9CA3AF">The main runtime path is:</text>
    <text x="184" y="674" fill="#67E8F9">src/index.ts → src/ui/App.tsx → src/pipeline/** → adapters/transports</text>

    <text x="184" y="724" fill="#D1D5DB">Results stream back into the terminal UI in real time, with tool activity,</text>
    <text x="184" y="752" fill="#D1D5DB">session persistence, and optional spoken playback as the answer arrives.</text>
  </g>

  <rect x="94" y="800" width="382" height="34" rx="17" fill="#162033"/>
